name: Kuro kainu surinkimas

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  collect-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repozitorija
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Idiegti priklausomybes
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Sukurti cookies direktorija
        run: mkdir -p cookies debug

      - name: Paleisti kainu surinkima
        env:
          CK_ADBLUE_URL: ${{ secrets.CK_ADBLUE_URL }}
          NESTE_URL: ${{ secrets.NESTE_URL }}
          NESTE_EMAIL: ${{ secrets.NESTE_EMAIL }}
          NESTE_PASSWORD: ${{ secrets.NESTE_PASSWORD }}
          AS24_URL: ${{ secrets.AS24_URL }}
          AS24_EMAIL: ${{ secrets.AS24_EMAIL }}
          AS24_PASSWORD: ${{ secrets.AS24_PASSWORD }}
          AS24_CLIENT_ID: ${{ secrets.AS24_CLIENT_ID }}
          AS24_STORAGE_STATE: ${{ secrets.AS24_STORAGE_STATE }}
        run: python main.py
        continue-on-error: true

      - name: Commit ir push JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kuro_kainos.json
          git diff --cached --quiet || git commit -m "Atnaujintos kuro kainos"
          git push

      - name: Ikelti debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug/
          retention-days: 7
          if-no-files-found: ignore
